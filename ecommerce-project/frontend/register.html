<!-- frontend/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ShopHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">ShopHub</a>
            <div class="nav-links">
                <a href="products.html">Products</a>
                <a href="cart.html" class="cart-link">Cart (<span id="cartCount">0</span>)</a>
            </div>
        </div>
    </nav>

    <main class="container auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary btn-block">Sign Up</button>
                <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
            </form>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const result = await register(name, email, password);
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                document.getElementById('errorMsg').textContent = result.error;
            }
        });
    </script>
</body>
</html>
