<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - ShopHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #666;
        }
        .filters-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .filter-group {
            display: inline-block;
            margin-right: 20px;
        }
        .filter-group label {
            margin-right: 10px;
            font-weight: 500;
        }
        .filter-group select {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }
        .products-count {
            margin: 20px 0;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🛍️ ShopHub</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="cart.html" class="cart-link">🛒 Cart (<span id="cartCount">0</span>)</a>
                <div id="authNav">
                    <a href="login.html" class="btn-outline">Login</a>
                    <a href="register.html" class="btn-primary">Sign Up</a>
                </div>
                <div id="userNav" style="display: none;">
                    <span id="userName" style="margin-right: 10px;"></span>
                    <button id="logoutBtn" class="btn-outline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1>All Products</h1>
        
        <div class="filters-section">
            <div class="filter-group">
                <label>📂 Category:</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Home">Home</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Sports">Sports</option>
                </select>
            </div>
            <div class="filter-group">
                <label>💰 Sort by:</label>
                <select id="sortFilter">
                    <option value="name">Name A-Z</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
            </div>
        </div>
        
        <div id="productsList" class="products-grid">
            <div class="loading">Loading products...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 ShopHub. All rights reserved. | Your One-Stop Shop</p>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Products page loaded');
            loadAllProducts();
            updateCartCount();
            
            // Add event listeners for filters
            const categoryFilter = document.getElementById('categoryFilter');
            const sortFilter = document.getElementById('sortFilter');
            
            if (categoryFilter) {
                categoryFilter.addEventListener('change', function() {
                    console.log('Category changed to:', this.value);
                    loadAllProducts();
                });
            }
            if (sortFilter) {
                sortFilter.addEventListener('change', function() {
                    console.log('Sort changed to:', this.value);
                    loadAllProducts();
                });
            }
        });
    </script>
</body>
</html>
